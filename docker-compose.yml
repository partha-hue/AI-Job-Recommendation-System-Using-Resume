version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-job-recommender-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ai-job-recommender-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
